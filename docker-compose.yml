version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dota_tinder_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    container_name: dota_tinder_bot
    restart: always
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata: